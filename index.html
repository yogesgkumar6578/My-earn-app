<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zilu Earn App</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}
.container{padding:15px;}
.box{
    background:#1e293b;
    padding:15px;
    margin:10px;
    border-radius:12px;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
}
input{
    padding:10px;
    width:80%;
    margin:5px;
    border-radius:8px;
    border:none;
}
.hidden{display:none;}
</style>

</head>
<body>

<div id="auth" class="container">
    <h2>Login / Signup</h2>
    <input id="username" placeholder="Enter Username"><br>
    <button onclick="login()">Enter App</button>
</div>

<div id="app" class="hidden container">

<h2>💰 Zilu Earn App</h2>

<div class="box">
    Wallet: <span id="coins">0</span> Coins
</div>

<div class="box">
    <h3>📺 Watch Video</h3>
    <button onclick="watchVideo()">Watch & Earn</button>
</div>

<div class="box">
    <h3>🎡 Spin</h3>
    <button onclick="spin()">Spin Now</button>
</div>

<div class="box">
    <h3>🎁 Daily Bonus</h3>
    <button onclick="daily()">Claim</button>
</div>

<div class="box">
    <h3>👥 Refer</h3>
    <p>Your Code: <b id="ref"></b></p>
</div>

<div class="box">
    <h3>💳 Withdraw</h3>
    <input id="upi" placeholder="Enter UPI ID"><br>
    <button onclick="withdraw()">Withdraw 100 Coins</button>
</div>

</div>

<script>

let user = "";
let coins = 0;

// Load data
function load(){
    let data = JSON.parse(localStorage.getItem(user)) || {coins:0,lastBonus:0};
    coins = data.coins;
    update();
}

// Save data
function save(){
    localStorage.setItem(user, JSON.stringify({
        coins: coins,
        lastBonus: Date.now()
    }));
}

// Update UI
function update(){
    document.getElementById("coins").innerText = coins;
}

// Login
function login(){
    user = document.getElementById("username").value;
    if(user==""){ alert("Enter username"); return; }

    document.getElementById("auth").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("ref").innerText = "REF"+user;

    load();
}

// Watch Video
function watchVideo(){
    alert("Playing video...");
    setTimeout(()=>{
        coins += 10;
        update();
        save();
        alert("10 coins earned");
    },2000);
}

// Spin
function spin(){
    let win = Math.floor(Math.random()*50);
    coins += win;
    update();
    save();
    alert("You got "+win+" coins");
}

// Daily Bonus
function daily(){
    let data = JSON.parse(localStorage.getItem(user));
    let now = Date.now();

    if(now - data.lastBonus < 86400000){
        alert("Already claimed today");
        return;
    }

    coins += 20;
    update();
    save();
    alert("20 coins added");
}

// Withdraw
function withdraw(){
    let upi = document.getElementById("upi").value;

    if(coins < 100){
        alert("Minimum 100 coins needed");
        return;
    }

    if(upi==""){
        alert("Enter UPI ID");
        return;
    }

    coins -= 100;
    update();
    save();

    alert("Withdrawal Requested (Demo)");
}

</script>

</body>
</html>
