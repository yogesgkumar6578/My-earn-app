<!DOCTYPE html>
<html>
<head>
    <title>Watch & Earn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body style="text-align: center; font-family: sans-serif; padding-top: 50px;">

    <div id="login-screen">
        <h2>Watch & Earn</h2>
        <p>Login to start earning</p>
        <button onclick="loginWithGoogle()" style="padding: 15px 30px; background: #4285F4; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
            Continue with Google
        </button>
    </div>

    <div id="main-app" style="display:none;">
        <h2 id="user-name">Welcome!</h2>
        <div style="background: gold; padding: 20px; display: inline-block; border-radius: 10px;">Coins: 100</div>
        <br><br>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        // Aapka Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCCpQmlyMQuzShY22Wnf53ajiyEdHofPv8",
            authDomain: "watch-and-earn-22586.firebaseapp.com",
            projectId: "watch-and-earn-22586",
            storageBucket: "watch-and-earn-22586.firebasestorage.app",
            messagingSenderId: "1064239379784",
            appId: "1:1064239379784:web:de48b0ea0826164c3eef7d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Google Login (Redirect Mode)
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }

        // Login check karne ke liye
        auth.getRedirectResult().then((result) => {
            if (result.user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('user-name').innerText = "Hello, " + result.user.displayName;
            }
        });

        function logout() {
            auth.signOut().then(() => { location.reload(); });
        }
    </script>
</body>
</html>
