<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zilu Pro</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* HEADER */
.header{
    padding:15px;
    text-align:center;
    background:linear-gradient(45deg,#38bdf8,#6366f1);
    font-size:20px;
}

/* PAGE */
.page{
    display:none;
    padding:15px;
}
.active{display:block;}

/* CARD */
.card{
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    margin:10px 0;
}

/* BUTTON */
button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    font-weight:bold;
}

/* NAVBAR */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:#1e293b;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
}

.nav button{
    background:none;
    color:white;
}

/* VIDEO MODAL */
#videoBox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    justify-content:center;
    align-items:center;
}
</style>

</head>
<body>

<div class="header">💰 Zilu Pro</div>

<!-- HOME -->
<div id="home" class="page active">
    <div class="card">
        💰 Coins: <span id="coins">0</span>
    </div>

    <div class="card">
        <h3>📺 Watch Video</h3>
        <button onclick="playVideo()">Play Video</button>
    </div>

    <div class="card">
        <h3>🎡 Spin</h3>
        <button onclick="spin()">Spin Now</button>
    </div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
    <div class="card">
        <h3>Wallet Balance</h3>
        <p id="walletCoins">0 Coins</p>
    </div>

    <div class="card">
        <h3>Withdraw</h3>
        <input id="upi" placeholder="Enter UPI ID"><br><br>
        <button onclick="withdraw()">Withdraw 100</button>
    </div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
    <div class="card">
        <h3>👤 Profile</h3>
        <img id="pic" width="80"><br><br>
        <b id="name"></b><br>
        <p id="email"></p>
    </div>

    <button onclick="logout()">Logout</button>
</div>

<!-- VIDEO PLAYER -->
<div id="videoBox" onclick="closeVideo()">
    <iframe id="videoFrame" width="300" height="200"
    src="" allowfullscreen></iframe>
</div>

<!-- NAVBAR -->
<div class="nav">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('wallet')">Wallet</button>
    <button onclick="showPage('profile')">Profile</button>
</div>

<script>

// ===== USER =====
let user = JSON.parse(localStorage.getItem("user")) || {
    name:"Guest",
    email:"guest@email.com",
    pic:"https://via.placeholder.com/80"
};

// ===== COINS =====
let coins = parseInt(localStorage.getItem("coins")) || 0;

function update(){
    document.getElementById("coins").innerText = coins;
    document.getElementById("walletCoins").innerText = coins + " Coins";
}
update();

// ===== NAVIGATION =====
function showPage(page){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

// ===== VIDEO =====
function playVideo(){
    document.getElementById("videoBox").style.display="flex";
    document.getElementById("videoFrame").src =
    "https://www.youtube.com/embed/dQw4w9WgXcQ";

    // earn after 5 sec
    setTimeout(()=>{
        coins += 10;
        localStorage.setItem("coins", coins);
        update();
        alert("10 coins earned!");
    },5000);
}

function closeVideo(){
    document.getElementById("videoBox").style.display="none";
    document.getElementById("videoFrame").src="";
}

// ===== SPIN =====
function spin(){
    let win = Math.floor(Math.random()*50);
    coins += win;
    localStorage.setItem("coins", coins);
    update();
    alert("You won "+win);
}

// ===== WITHDRAW =====
function withdraw(){
    let upi = document.getElementById("upi").value;

    if(coins < 100){
        alert("Minimum 100 coins needed");
        return;
    }

    if(upi==""){
        alert("Enter UPI ID");
        return;
    }

    coins -= 100;
    localStorage.setItem("coins", coins);
    update();

    alert("Withdrawal Requested (Demo)");
}

// ===== PROFILE =====
document.getElementById("pic").src = user.pic;
document.getElementById("name").innerText = user.name;
document.getElementById("email").innerText = user.email;

// ===== LOGOUT =====
function logout(){
    localStorage.clear();
    location.reload();
}

</script>

</body>
</html>
