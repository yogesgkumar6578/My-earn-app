<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch & Earn</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; }
        .btn-google { background: #4285F4; color: white; border: none; padding: 12px 20px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: 0.3s; }
        .btn-google:hover { background: #357ae8; }
        .user-info { display: none; }
        .coin-box { background: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; font-size: 20px; font-weight: bold; margin: 20px 0; border: 1px solid #ffeeba; }
        .logout-btn { color: #dc3545; cursor: pointer; text-decoration: underline; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card" id="auth-card">
        <div id="login-screen">
            <h2>Watch & Earn 💰</h2>
            <p>Video dekhein aur paise kamayein. Shuru karne ke liye login karein.</p>
            <button class="btn-google" onclick="loginWithGoogle()">
                Login with Google
            </button>
        </div>

        <div id="main-app" class="user-info">
            <h2 id="user-name">Namaste!</h2>
            <div class="coin-box">Wallet: 🪙 100 Coins</div>
            <p>Aaj ke naye videos taiyar hain!</p>
            <button style="padding: 10px 20px; border-radius: 5px; border: none; background: #28a745; color: white;">Watch Video</button>
            <br><br>
            <span class="logout-btn" onclick="logout()">Logout (Bahat niklein)</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCpQmlyMQuzShY22Wnf53ajiyEdHofPv8",
            authDomain: "watch-and-earn-22586.firebaseapp.com",
            projectId: "watch-and-earn-22586",
            storageBucket: "watch-and-earn-22586.firebasestorage.app",
            messagingSenderId: "1064239379784",
            appId: "1:1064239379784:web:de48b0ea0826164c3eef7d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Isse page refresh nahi hoga, sidha login box khulega
            auth.signInWithPopup(provider).then((result) => {
                updateUI(result.user);
            }).catch((error) => {
                console.error(error);
                // Agar popup block ho, toh redirect use karega
                auth.signInWithRedirect(provider);
            });
        }

        // Check if user is already logged in
        auth.onAuthStateChanged((user) => {
            if (user) { updateUI(user); }
        });

        function updateUI(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-name').innerText = "Namaste, " + user.displayName;
        }

        function logout() {
            auth.signOut().then(() => { location.reload(); });
        }
    </script>
</body>
</html>
