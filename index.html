<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch & Earn - Professional</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f0f2f5; margin: 0; padding-bottom: 20px; }
        .header { background: #1a73e8; color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .balance-card { background: white; width: 90%; margin: -20px auto 20px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .coin-txt { font-size: 30px; font-weight: bold; color: #1a73e8; }
        
        /* Grid System for Tasks */
        .task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .task-item { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .task-item img { width: 40px; margin-bottom: 10px; }
        .task-item h4 { margin: 0; font-size: 14px; color: #333; }
        
        /* Withdraw Section */
        .withdraw-box { background: white; margin: 15px; padding: 20px; border-radius: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-red { background: #34a853; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; justify-content: center; align-items: center; flex-direction: column; z-index: 100; }
    </style>
</head>
<body>

<div id="login-screen" style="text-align:center; padding:100px 20px;">
    <h1>💰 Earn Real Cash</h1>
    <button onclick="login()" style="padding:15px 30px; border-radius:30px; border:none; background:#1a73e8; color:white; font-weight:bold;">Login with Google</button>
</div>

<div id="main-app" style="display:none;">
    <div class="header">
        <h3>Welcome, <span id="u-name">User</span></h3>
    </div>

    <div class="balance-card">
        <p style="margin:0; color:#666;">Current Balance</p>
        <div class="coin-txt">🪙 <span id="balance">0</span></div>
        <small>Minimum 10 Coins for ₹10</small>
    </div>

    <div class="task-grid">
        <div class="task-item" onclick="startTimer('Daily Check-in')">
            <h4>📅 Daily Bonus</h4>
        </div>
        <div class="task-item" onclick="startTimer('Silver Scratch')">
            <h4>🥈 Silver Task</h4>
        </div>
        <div class="task-item" onclick="startTimer('Golden Scratch')">
            <h4>🥇 Gold Task</h4>
        </div>
        <div class="task-item" onclick="startTimer('Watch Video')">
            <h4>📺 Watch Video</h4>
        </div>
    </div>

    <div class="withdraw-box">
        <h4>Redeem Money</h4>
        <input type="text" id="upi" placeholder="Enter UPI ID (name@upi)">
        <button class="btn-red" onclick="redeem()">Withdraw 10 Coins (₹10)</button>
    </div>
</div>

<div id="overlay">
    <h2 id="task-title">Task Running</h2>
    <h1 id="timer">20</h1>
    <p>Please wait for coins...</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCCpQmlyMQuzShY22Wnf53ajiyEdHofPv8",
        authDomain: "watch-and-earn-22586.firebaseapp.com",
        projectId: "watch-and-earn-22586",
        databaseURL: "https://watch-and-earn-22586-default-rtdb.firebaseio.com/",
        storageBucket: "watch-and-earn-22586.firebasestorage.app",
        messagingSenderId: "1064239379784",
        appId: "1:1064239379784:web:de48b0ea0826164c3eef7d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('u-name').innerText = user.displayName;
            db.ref('users/' + user.uid).on('value', (s) => {
                document.getElementById('balance').innerText = s.val() ? s.val().coins : 0;
            });
        }
    });

    function startTimer(name) {
        document.getElementById('task-title').innerText = name;
        document.getElementById('overlay').style.display = 'flex';
        let sec = 20;
        let countdown = setInterval(() => {
            sec--;
            document.getElementById('timer').innerText = sec;
            if(sec <= 0) {
                clearInterval(countdown);
                addCoin();
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('timer').innerText = "20";
            }
        }, 1000);
    }

    function addCoin() {
        const user = auth.currentUser;
        db.ref('users/' + user.uid).transaction((c) => {
            let coins = (c && c.coins) ? c.coins : 0;
            return { coins: coins + 1 };
        });
        alert("Success! 1 Coin Added.");
    }

    function redeem() {
        const upi = document.getElementById('upi').value;
        const bal = parseInt(document.getElementById('balance').innerText);
        if(bal < 10) { alert("Minimum 10 Coins required!"); return; }
        if(!upi.includes('@')) { alert("Invalid UPI!"); return; }
        
        db.ref('users/' + auth.currentUser.uid).update({ coins: bal - 10 });
        alert("Redeem Success! ₹10 sent to " + upi);
    }
</script>
</body>
</html>
