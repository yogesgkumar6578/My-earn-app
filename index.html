<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch & Earn - Real Copy</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 0; text-align: center; }
        .header { background: #4a148c; color: white; padding: 20px; font-size: 20px; font-weight: bold; }
        .balance-section { background: white; margin: 15px; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .coins { font-size: 30px; color: #ffab00; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .menu-item { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; font-weight: bold; color: #333; }
        .menu-item:active { background: #eee; }

        .withdraw-box { background: white; margin: 15px; padding: 20px; border-radius: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-redeem { background: #2e7d32; color: white; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Full Screen Timer Overlay */
        #task-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #4a148c; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="login-div" style="padding: 100px 20px;">
    <h2>Earn Money Daily 💰</h2>
    <button onclick="login()" style="padding: 15px 30px; background: #4a148c; color: white; border: none; border-radius: 5px; font-weight: bold;">LOGIN WITH GOOGLE</button>
</div>

<div id="app-div" style="display: none;">
    <div class="header">WATCH AND EARN</div>
    
    <div class="balance-section">
        <p>Aapke Coins</p>
        <div class="coins">🪙 <span id="coin-balance">0</span></div>
        <p style="font-size: 12px; color: #666;">(Minimum 10 Coins = ₹10 Withdraw)</p>
    </div>

    <div class="grid">
        <div class="menu-item" onclick="startTask('Daily Check-in')">📅 Daily Check-in</div>
        <div class="menu-item" onclick="startTask('Silver Scratch')">🥈 Silver Task</div>
        <div class="menu-item" onclick="startTask('Golden Scratch')">🥇 Gold Task</div>
        <div class="menu-item" onclick="startTask('Watch Video')">📺 Watch Video</div>
    </div>

    <div class="withdraw-box">
        <h3>Redeem Money</h3>
        <input type="text" id="upi-id" placeholder="UPI ID daalein (e.g. name@paytm)">
        <button class="btn-redeem" onclick="redeem()">WITHDRAW 10 COINS</button>
    </div>

    <p onclick="logout()" style="color: red; cursor: pointer; margin-top: 20px;">Logout</p>
</div>

<div id="task-overlay">
    <div class="loader"></div>
    <h2 id="task-name">Task Running...</h2>
    <h1 id="timer-txt">20</h1>
    <p>Wait karein, coin load ho raha hai...</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCCpQmlyMQuzShY22Wnf53ajiyEdHofPv8",
        authDomain: "watch-and-earn-22586.firebaseapp.com",
        projectId: "watch-and-earn-22586",
        databaseURL: "https://watch-and-earn-22586-default-rtdb.firebaseio.com/",
        storageBucket: "watch-and-earn-22586.firebasestorage.app",
        messagingSenderId: "1064239379784",
        appId: "1:1064239379784:web:de48b0ea0826164c3eef7d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('login-div').style.display = 'none';
            document.getElementById('app-div').style.display = 'block';
            db.ref('users/' + user.uid).on('value', (s) => {
                document.getElementById('coin-balance').innerText = s.val() ? s.val().coins : 0;
            });
        }
    });

    function startTask(name) {
        document.getElementById('task-name').innerText = name;
        document.getElementById('task-overlay').style.display = 'flex';
        let timeLeft = 20;
        let countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-txt').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(countdown);
                addOneCoin();
                document.getElementById('task-overlay').style.display = 'none';
                document.getElementById('timer-txt').innerText = "20";
            }
        }, 1000);
    }

    function addOneCoin() {
        const user = auth.currentUser;
        db.ref('users/' + user.uid).transaction((current) => {
            let coins = (current && current.coins) ? current.coins : 0;
            return { coins: coins + 1 };
        });
        alert("Success! 1 Coin mil gaya.");
    }

    function redeem() {
        const upi = document.getElementById('upi-id').value;
        const balance = parseInt(document.getElementById('coin-balance').innerText);

        if(balance < 10) { alert("Balance kam hai! 10 Coins chahiye."); return; }
        if(!upi.includes('@')) { alert("Sahi UPI ID dalein!"); return; }

        db.ref('users/' + auth.currentUser.uid).update({ coins: balance - 10 });
        alert("Withdrawal Request Sent! ₹10 to " + upi);
    }
</script>
</body>
</html>
